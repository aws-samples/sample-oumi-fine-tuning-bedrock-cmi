# Oumi Framework Configuration
# This configuration file defines settings for fine-tuning models with Oumi
# and deploying to Amazon Bedrock.
#
# IMPORTANT: Replace all <PLACEHOLDER> values with your actual configuration
# before running the fine-tuning process.
#
# Config reference: oumi.core.configs.TrainingConfig
# See also: https://oumi.ai/docs/en/latest/user_guides/train/train.html

# Model Configuration
model:
  model_name: "meta-llama/Llama-3.2-1B-Instruct"
  model_max_length: 8192
  torch_dtype_str: "bfloat16"
  attn_implementation: "sdpa"
  load_pretrained_weights: True
  trust_remote_code: True

# Data Configuration
data:
  train:
    datasets:
      # Training dataset (e.g., "tatsu-lab/alpaca", or use dataset_path for local .jsonl files)
      - dataset_name: "tatsu-lab/alpaca"

# Training Configuration
training:
  trainer_type: "TRL_SFT"
  # Output directory for model artifacts (e.g., models/final)
  output_dir: "<OUTPUT_DIR>"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  optimizer: "adamw_torch_fused"
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  eval_strategy: "steps"
  eval_steps: 100
  enable_gradient_checkpointing: False
  compile: False
  dataloader_num_workers: "auto"
  dataloader_prefetch_factor: 32
  empty_device_cache_steps: 50
  include_performance_metrics: True
  mixed_precision_dtype: "BF16"
  enable_tensorboard: true
  enable_wandb: False
